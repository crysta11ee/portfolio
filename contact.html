<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Crystal Lee</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Crystal Lee</a>
  <button class="menu-toggle" onclick="document.querySelector('.nav-links').classList.add('active')">☰</button>
  <ul class="nav-links">
    <button class="menu-close" onclick="document.querySelector('.nav-links').classList.remove('active')">✕</button>
    <li><a href="about.html" onclick="document.querySelector('.nav-links').classList.remove('active')">About / 關於</a></li>
    <li><a href="portfolio.html" onclick="document.querySelector('.nav-links').classList.remove('active')">Portfolio / 作品</a></li>
    <li><a href="services.html" onclick="document.querySelector('.nav-links').classList.remove('active')">Services / 服務</a></li>
    <li><a href="contact.html" onclick="document.querySelector('.nav-links').classList.remove('active')">Contact / 聯絡</a></li>
  </ul>
</nav>

  <div class="page-header">
    <h1>Contact</h1>
    <p class="subtitle">聯絡我</p>
  </div>

  <section>
    <div class="contact-grid">

      <div class="contact-info">
        <h2>Let's work together.</h2>
        <p>For translation enquiries, collaborations, or general questions, please reach out.</p>
        <p style="font-family: 'Noto Serif TC', serif; color: #aaa; font-size: 0.95rem;">
          如有翻譯查詢、合作邀約或一般問題，歡迎隨時聯絡。
        </p>
        <br/>
        <a href="https://www.linkedin.com/in/crystallsw" target="_blank" class="contact-link">
          ↗ LinkedIn
        </a>
      </div>

      <div>
        <form class="contact-form"
              action="https://formspree.io/f/mbdpjjyd"
              method="POST">
          <input type="text" name="name" placeholder="Your Name / 姓名" required/>
          <input type="email" name="email" placeholder="Your Email / 電郵" required/>
          <input type="text" name="subject" placeholder="Subject / 主題"/>
          <textarea name="message" placeholder="Your Message / 留言" required></textarea>
          <button type="submit" class="btn-submit">Send Message / 發送</button>
        </form>
      </div>

    </div>
  </section>

  <footer>
    <span>© 2026 Crystal Lee. All rights reserved.</span>
    <div class="footer-links">
      <a href="https://www.linkedin.com/in/crystallsw" target="_blank">LinkedIn</a>
      <a href="contact.html">Contact</a>
    </div>
  </footer>

</body>
</html>
